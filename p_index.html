<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartCity Pro</title>

<link rel="stylesheet" href="style.css">

<!-- Leaflet CSS -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<!-- TOPO -->
<div class="topbar">

  <input
    id="search"
    placeholder="Buscar endereço..."
  >

  <button onclick="searchLocation()">
    Buscar
  </button>

  <button onclick="getLocation()">
    Minha localização
  </button>

</div>

<!-- MENU -->
<div class="sidebar">

  <h2>🚨 SmartCity</h2>

  <div class="card">🕳️ Problemas urbanos</div>
  <div class="card">🚦 Trânsito</div>
  <div class="card">🏥 Serviços</div>

  <!-- FORMULÁRIO -->
  <div class="form-box">

    <h3>🚧 Reportar problema</h3>

    <input id="tipo" placeholder="Tipo do problema">

    <input id="descricao" placeholder="Descrição">

    <input id="lat" placeholder="Latitude">

    <input id="lng" placeholder="Longitude">

    <button onclick="enviarProblema()">
      Enviar
    </button>

  </div>

</div>

<!-- MAPA -->
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ======================================================
// API DIDÁTICA / EXEMPLO
// Troque futuramente pela URL real do backend
// ======================================================

const API = "https://api-exemplo.com";


// ======================================================
// CRIAR MAPA
// ======================================================

const map = L.map('map').setView([-22.12, -51.39], 13);


// ======================================================
// OPENSTREETMAP
// ======================================================

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    attribution: '&copy; OpenStreetMap'
  }
).addTo(map);


// ======================================================
// LISTA DE MARCADORES
// ======================================================

let markers = [];


// ======================================================
// CARREGAR PROBLEMAS
// ======================================================

async function carregarProblemas() {

  try {

    const res = await fetch(`${API}/api/problemas`);

    const data = await res.json();

    markers.forEach(m => map.removeLayer(m));

    markers = [];

    data.forEach(p => {

      const marker = L.marker([p.lat, p.lng])

        .addTo(map)

        .bindPopup(`
          <b>${p.tipo}</b><br>
          ${p.descricao || ""}
        `);

      markers.push(marker);

    });

  } catch(error) {

    console.error("Erro ao carregar problemas:", error);

  }

}

carregarProblemas();


// ======================================================
// ENVIAR PROBLEMA
// ======================================================

async function enviarProblema() {

  const tipo = document.getElementById("tipo").value;

  const descricao =
    document.getElementById("descricao").value;

  const lat = parseFloat(
    document.getElementById("lat").value
  );

  const lng = parseFloat(
    document.getElementById("lng").value
  );

  // VALIDAÇÃO

  if (!tipo || !descricao || isNaN(lat) || isNaN(lng)) {

    alert("Preencha todos os campos!");

    return;
  }

  try {

    await fetch(`${API}/api/adicionar`, {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        tipo,
        descricao,
        lat,
        lng
      })

    });

    // LIMPAR FORMULÁRIO

    document.getElementById("tipo").value = "";

    document.getElementById("descricao").value = "";

    // RECARREGAR DADOS

    carregarProblemas();

    alert("Problema enviado com sucesso!");

  } catch(error) {

    console.error("Erro ao enviar:", error);

    alert("Erro ao enviar problema.");

  }

}


// ======================================================
// CLIQUE NO MAPA
// ======================================================

map.on("click", e => {

  document.getElementById("lat").value =
    e.latlng.lat;

  document.getElementById("lng").value =
    e.latlng.lng;

});


// ======================================================
// BUSCAR ENDEREÇO
// ======================================================

async function searchLocation() {

  const q =
    document.getElementById("search").value;

  if (!q) return;

  try {

    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${q}`
    );

    const data = await res.json();

    if (data.length > 0) {

      const lat = data[0].lat;

      const lon = data[0].lon;

      map.setView([lat, lon], 15);

      L.marker([lat, lon])

        .addTo(map)

        .bindPopup(data[0].display_name)

        .openPopup();
    }

  } catch(error) {

    console.error("Erro na busca:", error);

  }

}


// ======================================================
// GEOLOCALIZAÇÃO
// ======================================================

function getLocation() {

  if (!navigator.geolocation) {

    alert("Geolocalização não suportada.");

    return;
  }

  navigator.geolocation.getCurrentPosition(

    pos => {

      const lat = pos.coords.latitude;

      const lng = pos.coords.longitude;

      map.setView([lat, lng], 16);

      L.marker([lat, lng])

        .addTo(map)

        .bindPopup("Você está aqui")

        .openPopup();

    },

    () => {

      alert("Não foi possível obter localização.");

    }

  );

}

</script>

</body>
</html>
